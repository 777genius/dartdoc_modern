name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_BASE_PATH: /${{ github.event.repository.name }}
  VITEPRESS_BASE_PATH: /${{ github.event.repository.name }}/vitepress/
  JASPR_OUTPUT_DIR: jaspr-site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Get dependencies
        run: dart pub get

      - name: Generate Jaspr docs
        run: dart run bin/dartdoc_vitepress.dart --format jaspr --output $JASPR_OUTPUT_DIR

      - name: Install Jaspr dependencies
        run: dart pub get
        working-directory: ${{ env.JASPR_OUTPUT_DIR }}

      - name: Build Jaspr site
        run: dart run jaspr_cli:jaspr build --dart-define DOCS_BASE_PATH=${{ env.PAGES_BASE_PATH }}
        working-directory: ${{ env.JASPR_OUTPUT_DIR }}

      # Use the local dartdoc (dogfooding!)
      - name: Generate VitePress docs
        run: dart run bin/dartdoc_vitepress.dart --format vitepress --output docs-site

      - name: Install VitePress dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build VitePress site
        run: npx vitepress build
        working-directory: docs-site
        env:
          DOCS_BASE_PATH: ${{ env.VITEPRESS_BASE_PATH }}

      - name: Assemble Pages artifact
        run: |
          rm -rf publish
          mkdir -p publish/vitepress
          cp -R "$JASPR_OUTPUT_DIR/build/jaspr/." publish/
          cp -R docs-site/.vitepress/dist/. publish/vitepress/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

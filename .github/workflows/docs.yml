name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_BASE_PATH: /${{ github.event.repository.name }}
  JASPR_BASE_PATH: /${{ github.event.repository.name }}/jaspr/
  VITEPRESS_BASE_PATH: /${{ github.event.repository.name }}/vitepress/
  JASPR_OUTPUT_DIR: jaspr-site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Get dependencies
        run: dart pub get

      - name: Generate Jaspr docs
        run: dart run bin/dartdoc_modern.dart --format jaspr --recipe self-docs --output $JASPR_OUTPUT_DIR

      - name: Install Jaspr dependencies
        run: dart pub get
        working-directory: ${{ env.JASPR_OUTPUT_DIR }}

      - name: Build Jaspr site
        run: dart run jaspr_cli:jaspr build --dart-define DOCS_BASE_PATH=${{ env.JASPR_BASE_PATH }}
        working-directory: ${{ env.JASPR_OUTPUT_DIR }}

      # Use the local dartdoc (dogfooding!)
      - name: Generate VitePress docs
        run: dart run bin/dartdoc_modern.dart --format vitepress --recipe self-docs --output docs-site

      - name: Install VitePress dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build VitePress site
        run: npx vitepress build
        working-directory: docs-site
        env:
          DOCS_BASE_PATH: ${{ env.VITEPRESS_BASE_PATH }}

      - name: Assemble Pages artifact
        run: |
          rm -rf publish
          mkdir -p publish/jaspr publish/vitepress
          cp -R "$JASPR_OUTPUT_DIR/build/jaspr/." publish/jaspr/
          cp -R docs-site/.vitepress/dist/. publish/vitepress/

          create_redirect() {
            local output_path="$1"
            local target_path="$2"
            mkdir -p "$(dirname "$output_path")"
            cat > "$output_path" <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=$target_path">
              <link rel="canonical" href="$target_path">
              <script>window.location.replace("$target_path");</script>
              <title>Redirecting...</title>
            </head>
            <body>
              <p>Redirecting to <a href="$target_path">$target_path</a>.</p>
            </body>
          </html>
          EOF
          }

          create_redirect "publish/index.html" "${JASPR_BASE_PATH}"

          if [ -d "$JASPR_OUTPUT_DIR/web/guide" ]; then
            (
              cd "$JASPR_OUTPUT_DIR/web"
              find guide -name '*.html' -type f -exec cp --parents {} "$GITHUB_WORKSPACE/publish" \;
            )
          fi

          if [ ! -f publish/guide/index.html ]; then
            create_redirect "publish/guide/index.html" "${VITEPRESS_BASE_PATH}guide/"
          fi

          while IFS= read -r relative_path; do
            [ -n "$relative_path" ] || continue

            html_output="publish/guide/$relative_path"
            if [ ! -f "$html_output" ]; then
              create_redirect "$html_output" "${VITEPRESS_BASE_PATH}guide/$relative_path"
            fi

            clean_path="${relative_path%.html}"
            clean_output="publish/guide/$clean_path/index.html"
            if [ ! -f "$clean_output" ]; then
              create_redirect "$clean_output" "${VITEPRESS_BASE_PATH}guide/$relative_path"
            fi

            jaspr_route_input="$JASPR_OUTPUT_DIR/build/jaspr/guide/$clean_path/index.html"
            jaspr_html_output="publish/jaspr/guide/$relative_path"
            if [ ! -f "$jaspr_html_output" ]; then
              if [ -f "$jaspr_route_input" ]; then
                mkdir -p "$(dirname "$jaspr_html_output")"
                cp "$jaspr_route_input" "$jaspr_html_output"
              elif [ -f "$JASPR_OUTPUT_DIR/web/guide/$relative_path" ]; then
                mkdir -p "$(dirname "$jaspr_html_output")"
                cp "$JASPR_OUTPUT_DIR/web/guide/$relative_path" "$jaspr_html_output"
              fi
            fi

            jaspr_clean_output="publish/jaspr/guide/$clean_path/index.html"
            if [ ! -f "$jaspr_clean_output" ]; then
              if [ -f "$jaspr_route_input" ]; then
                mkdir -p "$(dirname "$jaspr_clean_output")"
                cp "$jaspr_route_input" "$jaspr_clean_output"
              else
                create_redirect "$jaspr_clean_output" "${VITEPRESS_BASE_PATH}guide/$relative_path"
              fi
            fi
          done < <(
            cd docs-site/.vitepress/dist/guide
            find . -name '*.html' -type f | sed 's#^\./##' | sort
          )

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

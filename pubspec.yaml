name: dartdoc_modern
version: 1.0.1
description: Fork of dartdoc with VitePress and Jaspr backends for generating modern API and guide documentation sites.
repository: https://github.com/777genius/dartdoc_modern

environment:
  sdk: ^3.8.0

dependencies:
  analyzer: ^12.0.0
  args: ^2.4.1
  collection: ^1.17.0
  crypto: ^3.0.3
  dart_style: ^3.1.8
  glob: ^2.1.1
  html: ^0.15.3
  http: ^1.6.0
  jaspr: ^0.22.4
  jaspr_content: ^0.5.1
  jaspr_router: ^0.8.1
  logging: ^1.1.1
  markdown: ^7.2.1
  meta: ^1.9.1
  package_config: ^2.1.0
  path: ^1.8.3
  pub_semver: ^2.1.4
  source_span: ^1.10.0
  syntax_highlight_lite: ^0.0.1
  universal_web: ^1.1.1+1
  web: ^1.1.1
  yaml: ^3.1.2

dev_dependencies:
  analyzer_testing: ^0.2.0
  async: ^2.11.0
  lints: ">=5.0.0 <7.0.0"
  matcher: ^0.12.15
  sass: ^1.87.0
  test: ^1.24.2
  test_descriptor: ^2.0.1
  test_process: ^2.0.3
  test_reflective_loader: ">=0.2.2 <0.5.0"

executables:
  dartdoc: dartdoc_modern
  dartdoc_modern: null
  dartdoc_vitepress: dartdoc_vitepress

name: dartdoc_modern
version: 1.1.7
description: Fork of dartdoc with VitePress and Jaspr backends for generating modern API and guide documentation sites.
repository: https://github.com/777genius/dartdoc_modern

platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.8.0

dependencies:
  analyzer: ^12.1.0
  args: ^2.7.0
  collection: ^1.19.1
  crypto: ^3.0.7
  dart_style: ^3.1.8
  glob: ^2.1.3
  html: ^0.15.6
  http: ^1.6.0
  jaspr: ^0.22.4
  jaspr_content: ^0.5.1
  jaspr_router: ^0.8.1
  logging: ^1.3.0
  markdown: ^7.3.1
  meta: ^1.18.2
  package_config: ^2.2.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  source_span: ^1.10.2
  syntax_highlight_lite: ^0.0.1
  universal_web: ^1.1.1+1
  web: ^1.1.1
  yaml: ^3.1.3

dev_dependencies:
  analyzer_testing: ^0.2.5
  async: ^2.13.1
  lints: ^6.1.0
  matcher: ^0.12.19
  sass: ^1.99.0
  test: ^1.31.0
  test_descriptor: ^2.0.2
  test_process: ^2.1.1
  test_reflective_loader: ^0.4.0

executables:
  dartdoc: dartdoc_modern
  dartdoc_modern: null
  dartdoc_vitepress: dartdoc_vitepress
